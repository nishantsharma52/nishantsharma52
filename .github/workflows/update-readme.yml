name: Update README with Live GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab
  push:
    branches: [main]          # also runs on every push to main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run stats script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: nishantsharma52
        run: node scripts/update-stats.js

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update live stats [skip ci]"
          git push
